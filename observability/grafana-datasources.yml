# Grafana 数据源自动配置
apiVersion: 1

datasources:
  # Prometheus - 指标查询
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true

  # Jaeger - 链路追踪查询
  - name: Jaeger
    type: jaeger
    access: proxy
    url: http://jaeger:16686
    editable: true
