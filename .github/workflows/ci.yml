name: CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'src/**'
      - 'tests/**'
      - '*.slnx'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/**'
      - '*.slnx'

permissions:
  contents: read
  pull-requests: write

env:
  DOTNET_VERSION: '10.0.x'
  SOLUTION_PATH: 'src/CKY.MAF.slnx'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore ${{ env.SOLUTION_PATH }}

      - name: Build
        run: dotnet build ${{ env.SOLUTION_PATH }} --no-restore --configuration Release

      - name: Run Unit Tests
        run: |
          dotnet test src/tests/UnitTests/CKY.MAF.Tests.csproj \
            --no-build \
            --configuration Release \
            --logger "trx;LogFileName=unit-tests.trx" \
            --results-directory ./TestResults \
            --collect:"XPlat Code Coverage" \
            -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=cobertura

      - name: Run Integration Tests (non-container)
        run: |
          dotnet test src/tests/IntegrationTests/CKY.MAF.IntegrationTests.csproj \
            --no-build \
            --configuration Release \
            --logger "trx;LogFileName=integration-tests.trx" \
            --results-directory ./TestResults \
            --collect:"XPlat Code Coverage" \
            --filter "FullyQualifiedName!~Redis&FullyQualifiedName!~Qdrant&FullyQualifiedName!~Testcontainers" \
            -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=cobertura

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: ./TestResults/**/*.trx
          retention-days: 30

      - name: Upload Coverage Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: ./TestResults/**/coverage.cobertura.xml
          retention-days: 30

      - name: Generate Coverage Report Summary
        if: success()
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: 'TestResults/**/coverage.cobertura.xml'
          badge: true
          format: markdown
          output: both
          thresholds: '60 80'

      - name: Enforce Coverage Threshold
        if: success()
        shell: bash
        run: |
          # Install reportgenerator
          dotnet tool install -g dotnet-reportgenerator-globaltool 2>/dev/null || true
          export PATH="$PATH:$HOME/.dotnet/tools"

          # Merge coverage reports
          reportgenerator \
            -reports:"TestResults/**/coverage.cobertura.xml" \
            -targetdir:CoverageReport \
            -reporttypes:Cobertura

          # Extract line coverage percentage
          LINE_RATE=$(grep -oP 'line-rate="\K[^"]+' CoverageReport/Cobertura.xml | head -1)
          COVERAGE=$(echo "$LINE_RATE * 100" | bc -l | xargs printf "%.1f")
          echo "Total line coverage: ${COVERAGE}%"

          THRESHOLD=60
          if (( $(echo "$COVERAGE < $THRESHOLD" | bc -l) )); then
            echo "::error::Coverage ${COVERAGE}% is below the minimum threshold of ${THRESHOLD}%"
            exit 1
          fi
          echo "✅ Coverage ${COVERAGE}% meets the minimum threshold of ${THRESHOLD}%"

      - name: Add Coverage PR Comment
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          recreate: true
          path: code-coverage-results.md

  docker:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    timeout-minutes: 10

    strategy:
      matrix:
        project:
          - name: smarthome
            path: src/Demos/SmartHome
            dockerfile: src/Demos/SmartHome/Dockerfile
          - name: customerservice
            path: src/Demos/CustomerService
            dockerfile: src/Demos/CustomerService/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build \
            -f ${{ matrix.project.dockerfile }} \
            -t cky-maf-${{ matrix.project.name }}:${{ github.sha }} \
            -t cky-maf-${{ matrix.project.name }}:latest \
            .
